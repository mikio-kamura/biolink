<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>mikio - Links</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="ミキオ | Miki Okamura | 岡村美紀 の X, GitHub, researchmap, Instagram" />
  <link rel="stylesheet" href="./index.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      VANTA.BIRDS({
        el: "#vanta",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.00,
        minWidth: 200.00,
        scale: 1.00,
        scaleMobile: 1.00,
        color1: 0x111122,
        color2: 0x000011,
        wingSpan: 11.00,
        separation: 79.00,
        alignment: 28.00,
        cohesion: 22.00,
        quantity: 4.00,
        backgroundAlpha: 0.00
      })

      setTimeout(() => {
        const main = document.querySelector('main')
        console.log('main:', main);
        main.style.opacity = 1
        main.style.filter = 'blur(0px)'
      }, 1000)
    })
  </script>
</head>

<body>
  <div id="vanta" </div>
    <main>
      <div class="profile">
        <div class="contact-trigger" id="contactTrigger">
          <img src="./images/mikio.jpg" />
          <div class="contact-overlay">
            <span id="overlayGreeting"></span>
          </div>
          <span class="contact-deco" id="contactDeco"></span>
          <div class="contact-form-panel">
            <button class="contact-form-close" id="contactFormClose">×</button>
            <div class="contact-form-inner">
              <h3 id="formTitle">Contact me!</h3>
              <form action="https://formspree.io/f/mdajjgbb" method="POST">
                <input type="text" name="name" id="formName" placeholder="Name" required />
                <input type="email" name="email" id="formEmail" placeholder="Email" required />
                <textarea name="message" id="formMessage" placeholder="Message" rows="2" required></textarea>
                <button type="submit" id="formSend">Send</button>
              </form>
            </div>
          </div>
        </div>
      </div>
      <ul>
        <p>doodling</p>
        <p>m i k i o</p>
        <p>crafting</p>
        <p>それ</p>
        <p>coding</p>
      </ul>
      <ul>
        <li>
          <a href="https://www.x.com/m_i_k_i_o">
            <img src="images/x.png" width="14" />
          </a>
        </li>
        <li>
          <a href="https://www.github.com/mikio-kamura">
            <img src="images/github.png" width="18" />
          </a>
        </li>
        <li>
          <a href="https://researchmap.jp/m_i_k_i_o/">
            <img src="images/researchmap.png" width="18" />
          </a>
        </li>
        <li>
          <a href="https://www.instagram.com/m__i__k__i__o">
            <img src="images/instagram.png" width="16" />
          </a>
        </li>
        <li>
          <a href="https://mikio-kamura.github.io/">
            <img src="images/mikio.png" width="60" />
          </a>
        </li>
      </ul>

    </main>

    <script>
      const contactTrigger = document.getElementById('contactTrigger')
      const contactFormClose = document.getElementById('contactFormClose')
      const contactFormPanel = document.querySelector('.contact-form-panel')

      const lang = 'ja' // デバッグ用: 日本語を強制
      // const lang = 'en' // デバッグ用: 英語を強制
      // const lang = (navigator.language || '').toLowerCase()

      const isJa = lang.startsWith('ja')

      document.getElementById('contactDeco').textContent = isJa ? 'お気軽に!' : 'Feel free!'

      document.getElementById('overlayGreeting').textContent =
        isJa ? 'こんにちは!' :
          lang.startsWith('nl') ? 'Hoi!' :
            'Hello!'

      if (isJa) {
        document.getElementById('formTitle').textContent = 'お話しませんか'
        document.getElementById('formName').placeholder = 'お名前'
        document.getElementById('formEmail').placeholder = 'メールアドレス'
        document.getElementById('formMessage').placeholder = 'お言葉'
        document.getElementById('formSend').textContent = '送信'
      }

      const contactForm = document.querySelector('.contact-form-inner form')
      contactForm.setAttribute('novalidate', '')

        ;['formName', 'formEmail', 'formMessage'].forEach(id => {
          const span = document.createElement('span')
          span.className = 'field-error'
          document.getElementById(id).insertAdjacentElement('afterend', span)
        })

      const errEmpty = isJa ? '空白です' : 'Please fill in this field'
      const errEmail = isJa ? 'メールアドレスですか' : 'Please enter a valid email address'

      function showError(id, msg) {
        document.getElementById(id).nextElementSibling.textContent = msg
      }
      function clearErrors() {
        contactForm.querySelectorAll('.field-error').forEach(s => s.textContent = '')
      }

      contactForm.addEventListener('submit', async (e) => {
        e.preventDefault()
        clearErrors()

        const name = document.getElementById('formName')
        const email = document.getElementById('formEmail')
        const message = document.getElementById('formMessage')
        let valid = true

        if (!name.value.trim()) { showError('formName', errEmpty); valid = false }
        if (!email.value.trim()) { showError('formEmail', errEmpty); valid = false }
        else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) { showError('formEmail', errEmail); valid = false }
        if (!message.value.trim()) { showError('formMessage', errEmpty); valid = false }
        if (!valid) return

        const inner = document.querySelector('.contact-form-inner')
        const successMsg = isJa
          ? `<h3 class="contact-result-title">お問い合わせありがとうございました!</h3>
             <p class="contact-result-body">送信が完了しました。後日、折り返しご連絡させていただきます。しばらくしても連絡がない場合は、ご入力の連絡先に誤りがあった可能性がございます。迷惑フォルダもご確認の上、再度ご連絡をお願いします。</p>`
          : `<h3 class="contact-result-title">Thank you!</h3>
             <p class="contact-result-body">Your transmission has been completed. I will contact you shortly. If you do not hear from me after a while, there may have been an error in the contact information. Please check your spam folder and contact me again.</p>`
        const failMsg = isJa
          ? `<p class="contact-result-body">送信に失敗しました。もう一度お試しください。</p>`
          : `<p class="contact-result-body">Something went wrong. Please try again.</p>`

        // inner.innerHTML = successMsg; return // デバッグ用: 完了メッセージを確認
        // inner.innerHTML = failMsg; return // デバッグ用: エラーメッセージを確認

        const res = await fetch(contactForm.action, {
          method: 'POST',
          body: new FormData(contactForm),
          headers: { Accept: 'application/json' }
        })
        inner.innerHTML = res.ok ? successMsg : failMsg
      })

      const isTouchOnly = window.matchMedia('(hover: none) and (pointer: coarse)').matches
      let greetingTimer = null

      function openContact() {
        contactTrigger.classList.remove('greeting')
        clearTimeout(greetingTimer)
        contactTrigger.classList.add('open')
      }

      function closeContact() {
        contactTrigger.classList.remove('open')
        contactTrigger.classList.remove('greeting')
        clearTimeout(greetingTimer)
      }

      contactTrigger.addEventListener('click', (e) => {
        if (contactTrigger.classList.contains('open')) return

        e.stopPropagation()

        if (isTouchOnly && !contactTrigger.classList.contains('greeting')) {
          contactTrigger.classList.add('greeting')
          greetingTimer = setTimeout(openContact, 1500)
          return
        }

        openContact()
      })

      contactFormPanel.addEventListener('click', (e) => {
        e.stopPropagation()
      })

      contactFormClose.addEventListener('click', (e) => {
        e.stopPropagation()
        closeContact()
      })

      document.addEventListener('click', (e) => {
        if (contactTrigger.classList.contains('open') && !contactFormPanel.contains(e.target)) {
          closeContact()
        } else if (contactTrigger.classList.contains('greeting') && !contactTrigger.contains(e.target)) {
          closeContact()
        }
      })
    </script>
</body>

</html>
